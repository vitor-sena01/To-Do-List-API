<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>✦</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="noise"></div>

    <header>
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">✦</span>
                <span class="logo-text">Tarefas</span>
            </div>
            <div class="header-stats">
                <span class="stat"><span id="countPendente">0</span> pendentes</span>
                <span class="stat-sep">·</span>
                <span class="stat"><span id="countConcluida">0</span> concluídas</span>
            </div>
        </div>
    </header>

    <main>
        <section class="form-section">
            <h1 class="section-title">Nova Tarefa</h1>
            <form id="tarefaForm" novalidate>
                <div class="field">
                    <label for="tarefa">Tarefa <span class="required">*</span></label>
                    <input type="text" id="tarefa" placeholder="O que precisa ser feito?">
                    <div class="field-error" id="tarefaErro">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E24B4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        Preencha este campo.
                    </div>
                </div>
                <div class="field">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" rows="2" placeholder="Detalhes opcionais..."></textarea>
                </div>
                <div class="field-row">
                    <div class="field">
                        <label for="prioridade">Prioridade</label>
                        <select id="prioridade">
                            <option value="Baixa">Baixa</option>
                            <option value="Média" selected>Média</option>
                            <option value="Alta">Alta</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-add">
                        <span class="btn-icon">+</span>
                        <span>Adicionar</span>
                    </button>
                </div>
            </form>
        </section>

        <section class="list-section">
            <div class="list-header">
                <h2 class="section-title">Tarefas</h2>
                <div class="filters">
                    <button class="filter-btn active" data-filter="Todas">Todas</button>
                    <button class="filter-btn" data-filter="Pendente">Pendentes</button>
                    <button class="filter-btn" data-filter="Concluída">Concluídas</button>
                </div>
            </div>
            <div id="listaTarefas" class="lista"></div>
            <p id="emptyState" class="empty-state" style="display:none">
                Nenhuma tarefa aqui ainda.<br>Adicione uma acima ✦
            </p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
