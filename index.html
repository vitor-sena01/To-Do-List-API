<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📋</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Lista de Tarefas</h1>

    <form id="tarefaForm">
        <div class="form-group">
            <label>Tarefa:</label>
            <input type="text" id="tarefaInput" required placeholder="Ex: Estudar Histologia">
        </div>
        <div class="form-group">
            <label>Descrição:</label>
            <textarea id="descricaoInput" rows="2" placeholder="detalhes da tarefa..."></textarea>
        </div>
        <div class="form-group">
            <label>Prioridade:</label>
            <select id="prioridadeSelect">
                <option value="Baixa">Baixa</option>
                <option value="Média" selected>Média</option>
                <option value="Alta">Alta</option>
            </select>
        </div>
        <button type="submit">Adicionar Tarefa</button>
    </form>
    
    <div id="listaTarefas"></div>

    <script>
        // Como o HTML roda no mesmo servidor, podemos usar o caminho relativo
        const API_URL = '/api/tarefas';

        // 1. FUNÇÃO QUE BUSCA AS TAREFAS DO SERVIDOR E MOSTRA NA TELA
        // Substitua a função carregarTarefas() no seu <script> do index.html por esta:
async function carregarTarefas() {
    const res = await fetch(API_URL);
    const tarefas = await res.json();
    const container = document.getElementById('listaTarefas');
    container.innerHTML = ''; 

    if (tarefas.length === 0) {
        container.innerHTML = '<div class="empty-state">Nenhuma tarefa cadastrada por enquanto.</div>';
        return;
    }

    tarefas.forEach(t => {
        const card = document.createElement('div');
        // Adiciona a classe correspondente à prioridade (Alta, Média, Baixa) e ao status
        card.className = `tarefa-card ${t.prioridades} ${t.status}`;
        
        card.innerHTML = `
            <div class="card-left">
                <button class="check-btn" onclick="concluirTarefa(${t.id})">✓</button>
            </div>
            <div class="card-body">
                <div class="card-title">${t.tarefa}</div>
                <div class="card-desc">${t.descricao || '<i>Sem descrição.</i>'}</div>
                <div class="card-meta">
                    <span class="badge prio-${t.prioridades}">Prioridade: ${t.prioridades}</span>
                    <span class="badge status-${t.status}">${t.status}</span>
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}
        // 2. FUNÇÃO QUE PEGA O QUE VOCÊ DIGITOU NA TELA E ENVIA PARA A API
        document.getElementById('tarefaForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede a página de atualizar do nada
            
            // Pega os valores exatos dos campos digitados no localhost
            const novaTarefa = {
                tarefa: document.getElementById('tarefaInput').value,
                descricao: document.getElementById('descricaoInput').value,
                prioridades: document.getElementById('prioridadeSelect').value,
                status: 'Pendente'
            };

            // Dispara o envio (POST) para o servidor
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(novaTarefa)
            });

            // Limpa os campos do formulário para você digitar a próxima
            document.getElementById('tarefaForm').reset();
            
            // Atualiza a lista na tela com a nova tarefa inclusa
            carregarTarefas();
        });

        // 3. FUNÇÃO PARA MARCAR COMO CONCLUÍDA
        async function concluirTarefa(id) {
            await fetch(`${API_URL}/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'Concluída' })
            });
            carregarTarefas();
        }

        // Executa automaticamente assim que a página abre
        carregarTarefas();
    </script>
</body>
</html>
